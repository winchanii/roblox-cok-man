<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход выполнен - Roblox Account Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .success-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="success-icon">✓</div>
        <h1>Вход выполнен!</h1>
        <p>Добро пожаловать, {{ username }}!</p>
        <p>Токен сохранён. Сейчас вы будете перенаправлены...</p>
        <a href="/" class="btn">Перейти на главную</a>
    </div>
    
    <script>
        // Сохраняем токен из URL или из response
        const token = "{{ token }}";
        if (token) {
            localStorage.setItem('token', token);
        }
        
        // Перенаправление через 2 секунды
        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    </script>
</body>
</html>
