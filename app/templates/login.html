{% extends "base.html" %}

{% block title %}Вход - Roblox Account Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="bi bi-box-arrow-in-right"></i> Вход</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> Для входа получите ключ в Discord боте вашего сервера
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="accessKey" class="form-label">Ключ доступа</label>
                        <input type="text" class="form-control" id="accessKey" required 
                               placeholder="Введите ваш ключ">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </button>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <a href="/auth/discord" class="btn btn-discord">
                        <i class="bi bi-discord"></i> Войти через Discord
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const accessKey = document.getElementById('accessKey').value;
    const formData = new FormData();
    formData.append('access_key', accessKey);
    
    try {
        const response = await fetch('/auth/key', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user_id', data.user_id);
            window.location.href = '/';
        } else {
            alert('Ошибка: ' + (data.detail || 'Неверный ключ'));
        }
    } catch (error) {
        alert('Ошибка подключения: ' + error.message);
    }
});
</script>
{% endblock %}
